<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>cricket atlas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="app-container">
        <div id="welcome-view" class="view active">
            <div class="hero">
                <h1>cricket atlas</h1>
                <p>the infinite name chain engine.</p>
            </div>
            
            <div class="setup-card">
                <h3>difficulty</h3>
                <div class="filter-bar" id="difficulty-tabs">
                    <button class="tab-btn diff-btn active" data-mode="easy">easy</button>
                    <button class="tab-btn diff-btn" data-mode="medium">medium</button>
                    <button class="tab-btn diff-btn" data-mode="hard">hard</button>
                </div>

                <h3 style="margin-top: 20px;">category</h3>
                <div class="filter-bar" id="category-tabs">
                    <button class="tab-btn cat-btn active" data-category="general">general</button>
                    <button class="tab-btn cat-btn" data-category="intl">intl only</button>
                    <button class="tab-btn cat-btn" data-category="domestic">domestic only</button>
                    <button class="tab-btn cat-btn" data-category="men">men only</button>
                    <button class="tab-btn cat-btn" data-category="women">women only</button>
                </div>
                
                <div id="mode-help-text" class="mode-help">
                    <span>easy (general):</span> standard name chain. initials are accepted and expanded by the engine. any verified cricketer is valid.
                </div>

                <button id="start-btn" class="primary-btn" style="margin-top: 24px;">initialize engine</button>
            </div>
        </div>

        <div id="game-view" class="view" style="display: none;">
            <header>
                <div class="header-info">
                    <h2>engine active</h2>
                    <span id="mode-display" class="mode-badge">mode: easy / general</span>
                </div>
                <div class="score-box">
                    <span class="score-label">chain</span>
                    <span id="score" class="score-value">0</span>
                </div>
            </header>

            <div class="status-panel">
                <div class="status-label">required letter</div>
                <div id="game-status" class="status-letter">...</div>
            </div>

            <div id="chain-list" class="feed-container">
                </div>

            <div class="input-area">
                <div id="message" class="system-message">// awaiting input...</div>
                <div class="input-group">
                    <input type="text" id="player-input" placeholder="enter player name..." autocomplete="off" disabled>
                    <button id="submit-btn" disabled>&gt;</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
