<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>cricket atlas | ranked</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
    <meta name="theme-color" content="#1a0b2e">
    
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="app-container">
        
        <div id="auth-view" class="view active">
            <div class="hero">
                <h1>CRICKET ATLAS</h1>
                <p>multiplayer arena</p>
            </div>
            <div class="center-card">
                <button id="google-login-btn" class="primary-btn">SIGN IN WITH GOOGLE</button>
            </div>
        </div>

        <div id="lobby-view" class="view" style="display: none;">
            <header class="simple-header">
                <div class="user-profile">
                    <span id="player-name-display">player</span>
                    <button id="logout-btn" class="text-btn">logout</button>
                </div>
            </header>
            <div class="center-card">
                <h3>RANKED MATCHMAKING</h3>
                <p class="mode-desc">mode: easy / general<br>initials allowed. any verified cricketer.</p>
                <button id="find-match-btn" class="primary-btn pulse">FIND OPPONENT</button>
                <div id="lobby-status" class="system-message" style="margin-top: 16px; text-align: center;"></div>
            </div>
        </div>

        <div id="game-view" class="view" style="display: none;">
            <header>
                <div class="player-stat-block opponent">
                    <span class="stat-name" id="opponent-name">OPPONENT</span>
                    <span class="lives-value" id="opponent-lives">♥♥♥</span>
                </div>
                <div class="vs-badge">VS</div>
                <div class="player-stat-block you">
                    <span class="stat-name">YOU</span>
                    <span class="lives-value" id="your-lives">♥♥♥</span>
                </div>
            </header>

            <div class="status-panel">
                <div class="status-label" id="turn-indicator">waiting for match...</div>
                <div id="game-status" class="status-letter">...</div>
            </div>

            <div id="chain-list" class="feed-container">
                </div>

            <div class="input-area">
                <div id="message" class="system-message">// awaiting input...</div>
                <div class="input-group">
                    <input type="text" id="player-input" placeholder="enter player name..." autocomplete="off" disabled>
                    <button id="submit-btn" disabled>&gt;</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
