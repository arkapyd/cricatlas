<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cricket atlas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
</head>
<body>
    <div class="container">
        <header>
            <h1>cricket atlas</h1>
            <p class="score">score: <span id="score">0</span></p>
        </header>

        <div class="game-board">
            <div id="game-status" class="status-box">
                loading players...
            </div>

            <div class="input-area">
                <input type="text" id="player-input" placeholder="e.g., rahul dravid" disabled autocomplete="off">
                <button id="submit-btn" disabled>play</button>
            </div>
            
            <p id="message" class="message"></p>
        </div>

        <div class="history">
            <h3>chain</h3>
            <ul id="chain-list"></ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
